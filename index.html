<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>마린 블라스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, system-ui, sans-serif;
      padding: 0;
    }
    #stage {
      position: relative;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #001830;
    }
    #ui-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      color: #fff;
      font-family: 'Courier New', monospace;
    }
.modal {
  position: absolute;
  inset: 0;
  background: rgba(0, 12, 28, 0.85);
  display: none;
  align-items: center;
  justify-content: flex-start;
  padding-top: 8px;
  padding-left: 8px;
  padding-right: 8px;
  padding-bottom: 8px;
  overflow-y: auto;
  pointer-events: auto;
}
    .modal.show { display: flex; }
.modal-box {
  background: #001a30;
  border: 2px solid #2aa;
  padding: 16px 18px;
  width: 100%;
  max-width: 280px;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  text-align: center;
  color: #fff;
  margin: auto;       /* ← 이 줄 추가 */
  flex-shrink: 0;     /* ← 이 줄 추가 */
}
    .modal-box h2 { margin-bottom: 10px; color: #ffd; font-size: 18px; flex-shrink: 0; }
    .modal-box p  { margin-bottom: 10px; font-size: 13px; line-height: 1.5; flex-shrink: 0; }
    .modal-box input {
      width: 100%; padding: 8px;
      background: #002240; border: 1px solid #2aa;
      color: #fff; font-family: inherit; font-size: 14px;
      margin-bottom: 10px;
      flex-shrink: 0;
    }
    .btn-row {
      display: flex; gap: 8px; justify-content: center;
      flex-shrink: 0;
    }
    .modal-box button {
      flex: 1;
      padding: 9px 8px;
      background: #2aa; border: none; color: #001830;
      font-weight: bold; cursor: pointer;
      font-family: inherit; font-size: 13px;
      max-width: 130px;
    }
    .modal-box button.secondary { background: #355; color: #fff; }
    .modal-box button:hover { filter: brightness(1.15); }
    .leaderboard {
      text-align: left;
      /* flex item이라 남은 공간 채우고 넘치면 스크롤 */
      flex: 1;
      min-height: 0;
      max-height: min(240px, 40vh);
      overflow-y: auto;
      overflow-x: hidden;
      margin-bottom: 12px;
      font-size: 12px;
      scrollbar-width: thin;
      scrollbar-color: #2aa #001a30;
    }
    .leaderboard::-webkit-scrollbar { width: 4px; }
    .leaderboard::-webkit-scrollbar-track { background: #001a30; }
    .leaderboard::-webkit-scrollbar-thumb { background: #2aa; border-radius: 2px; }
    .leaderboard .row {
      display: flex;
      justify-content: space-between;
      padding: 4px 2px;
      border-bottom: 1px solid #024;
    }
    .leaderboard .row .rank  { color: #8cf; min-width: 22px; }
    .leaderboard .row .name  { flex: 1; padding: 0 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .leaderboard .row .score { color: #ffc; }
    .leaderboard .row.you { background: rgba(80, 200, 255, 0.12); }
    .leaderboard .row.you .name { color: #ff6; font-weight: bold; }
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #80e0ff;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      pointer-events: auto;
    }
    #loading.hidden { display: none; }
  </style>
</head>
<body>
  <div id="stage">
    <canvas id="game"></canvas>
    <div id="ui-overlay">
      <div id="loading">LOADING... 0%</div>
      <div id="modal-name" class="modal">
        <div class="modal-box">
          <h2>GAME OVER</h2>
          <p>Score: <span id="final-score">0</span></p>
          <input id="player-name" type="text" maxlength="12" placeholder="이름 (최대 12자)" />
          <div class="btn-row">
            <button id="submit-score">기록 등록</button>
            <button id="skip-score" class="secondary">다시 시작</button>
          </div>
        </div>
      </div>
      <div id="modal-board" class="modal">
        <div class="modal-box">
          <h2>RANKING TOP 10</h2>
          <div id="board-list" class="leaderboard">로딩 중...</div>
          <div class="btn-row">
            <button id="board-restart">다시 시작</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
